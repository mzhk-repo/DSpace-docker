services:
  dspacedb:
    container_name: !reset null
    restart: !reset null
    entrypoint:
      - /bin/sh
      - -c
      - |
        while IFS= read -r _l || [ -n "$$_l" ]; do
          case "$$_l" in
            '' | '#'*) continue ;;
            POSTGRES_PASSWORD=*) continue ;;
            *=*) export "$$_l" ;;
          esac
        done < /run/secrets/app_env_payload
        exec "$$@"
      - --
    command:
      - docker-entrypoint.sh
      - postgres
    env_file: !reset []
    environment: !override
      TZ: ${TZ:-Europe/Kyiv}
      PGDATA: ${POSTGRES_PGDATA:-/pgdata}
      POSTGRES_DB: ${POSTGRES_DB:-dspace}
      POSTGRES_USER: ${POSTGRES_USER:-dspace}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - source: app_env_payload
        target: app_env_payload
      - source: postgres_password
        target: postgres_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager

  dspacesolr:
    container_name: !reset null
    restart: !reset null
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager

  dspace:
    container_name: !reset null
    restart: !reset null
    depends_on: !reset null
    entrypoint:
      - /bin/sh
      - -c
      - |
        while IFS= read -r _l || [ -n "$$_l" ]; do
          case "$$_l" in
            '' | '#'*) continue ;;
            POSTGRES_PASSWORD=*) continue ;;
            *=*) export "$$_l" ;;
          esac
        done < /run/secrets/app_env_payload
        exec /opt/dspace/scripts/entrypoint.sh "$$@"
      - --
    env_file: !reset []
    environment: !override
      TZ: ${TZ:-Europe/Kyiv}
      JAVA_OPTS: "${DSPACE_JAVA_OPTS:--Xmx2000m -Djava.security.egd=file:/dev/./urandom}"
      dspace__P__dir: ${DSPACE_DIR:-/dspace}
      dspace__P__name: ${DSPACE_NAME:-KDV Library Repository}
      db__P__url: "jdbc:postgresql://dspacedb:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-dspace}"
      db__P__username: ${POSTGRES_USER:-dspace}
      solr__P__server: "http://dspacesolr:${SOLR_INTERNAL_PORT:-8983}/solr"
      dspace__P__server__P__url: ${DSPACE_REST_BASEURL:-http://localhost:8081/server}
      dspace__P__ui__P__url: ${DSPACE_UI_BASEURL:-http://localhost:8081}
      rest__P__cors__P__allowed__D__origins: ${DSPACE_UI_BASEURL:-http://localhost:8081}
      proxies__P__trusted__P__ipranges: ${DSPACENET_SUBNET:-172.23.0.0/16}
    secrets:
      - source: app_env_payload
        target: app_env_payload
      - source: postgres_password
        target: POSTGRES_PASSWORD
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${EXTERNAL_NETWORK}"
        - "traefik.http.routers.dspace-api.rule=Host(`${DSPACE_HOSTNAME}`) && PathPrefix(`/server`)"
        - "traefik.http.routers.dspace-api.entrypoints=web"
        - "traefik.http.routers.dspace-api.priority=100"
        - "traefik.http.routers.dspace-api.middlewares=forwarded-https@docker,security-headers@docker"
        - "traefik.http.services.dspace-api.loadbalancer.server.port=8080"

  dspace-angular:
    container_name: !reset null
    restart: !reset null
    depends_on: !reset null
    entrypoint:
      - /bin/sh
      - -c
      - |
        while IFS= read -r _l || [ -n "$$_l" ]; do
          case "$$_l" in '' | '#'*) continue ;; *=*) export "$$_l" ;; esac
        done < /run/secrets/app_env_payload
        export DSPACE_REST_HOST="${DSPACE_HOSTNAME}"
        export DSPACE_REST_PORT="443"
        export DSPACE_REST_SSL="true"
        exec pm2-runtime start dspace-ui.json --json
    env_file: !reset []
    environment: []
    secrets:
      - source: app_env_payload
        target: app_env_payload
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- --header="Host: ${DSPACE_HOSTNAME}" http://127.0.0.1:${DSPACE_UI_PORT:-8081}/ >/dev/null 2>&1'
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${EXTERNAL_NETWORK}"
        - "traefik.http.routers.dspace-ui.rule=Host(`${DSPACE_HOSTNAME}`)"
        - "traefik.http.routers.dspace-ui.entrypoints=web"
        - "traefik.http.routers.dspace-ui.priority=10"
        - "traefik.http.routers.dspace-ui.middlewares=forwarded-https@docker,security-headers@docker"
        - "traefik.http.services.dspace-ui.loadbalancer.server.port=8081"
        - "traefik.http.services.dspace-ui.loadbalancer.passhostheader=true"

secrets:
  app_env_payload:
    external: true
    name: ${DSPACE_APP_ENV_PAYLOAD_SECRET_NAME}
  postgres_password:
    external: true
    name: ${DSPACE_POSTGRES_PASSWORD_SECRET_NAME}
